<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passkey</title>
  <link rel="stylesheet" href="style.css">

  <!-- Font Awesome for icons -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <div class="container">

    <!-- Header -->
    <header>
      <i class="fa-solid fa-shield-halved logo"></i>
      <h1>Passkey</h1>
      <p>
        <b>Password Strength Checker</b><br>
        Check the strength of your password and see if it is
        Weak, Medium, or Strong.
      </p>
    </header>

    <div class="main-row">

      <div class="left-section">

    <!-- Password Box -->
    <div class="password-box">

      <label for="password">Enter Password</label>

      <div class="input-group">
        <input
          type="password"
          id="password"
          placeholder="Type your password..."
        >

        <button id="toggleBtn">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>

      <!-- Strength Bar -->
      <div class="strength-bar">
        <div class="strength-fill" id="fill"></div>
      </div>

      <div class="content-row">

        <div class="checker-content">
      <h3 id="message">Password Strength</h3>

      <div class="generator">

  <h4>Generate Password</h4>

  <label for="lengthSelect">Password Length</label>
  <select id="lengthSelect">
    <option value="8">8 Characters</option>
    <option value="10">10 Characters</option>
    <option value="16">16 Characters</option>
  </select>

  <label for="typeSelect">Password Type</label>
  <select id="typeSelect">
    <option value="alphanumeric">
      Alphabets & Numbers
    </option>

    <option value="symbols">
      Alphanumeric + Symbols
    </option>
  </select>

  <button id="generateBtn">
    Generate Password
  </button>

  <div class="generated-password">
    <input
      type="text"
      id="generatedPassword"
      readonly
      placeholder="Generated password appears here"
    >
  </div>

</div>

        </div>
      </div>

    </div>

  </div>

  </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
